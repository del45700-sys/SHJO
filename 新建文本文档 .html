<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHJO Official Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:linear-gradient(135deg,#ff8a00,#ff5e62);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}
.card{
background:#fff;
width:100%;
max-width:420px;
border-radius:24px;
padding:35px 25px;
box-shadow:0 15px 40px rgba(0,0,0,.18);
text-align:center;
}
.logo{
font-size:34px;
font-weight:700;
color:#ff6b00;
margin-bottom:10px;
}
.subtitle{
color:#666;
margin-bottom:30px;
}
.btn{
display:block;
text-decoration:none;
padding:18px;
margin:14px 0;
border-radius:16px;
font-size:18px;
font-weight:600;
color:#fff;
transition:.2s;
}
.kenya{background:#00a651;}
.ghana{background:#ce1126;}
.btn:hover{transform:translateY(-2px);}
.footer{
margin-top:20px;
font-size:12px;
color:#999;
}
</style>
</head>
<body>
<div class="card">
<div class="logo">SHJO</div>
<div class="subtitle">Choose Your Country Store</div>

<a class="btn kenya" href="https://www.jumia.co.ke/shjo-flagship-shop/">
🇰🇪 Jumia Kenya
</a>

<a class="btn ghana" href="https://www.jumia.com.gh/shjo-flagship-shop/">
🇬🇭 Jumia Ghana
</a>

<div class="footer">Official SHJO Flagship Store</div>
</div>
</body>
</html>
